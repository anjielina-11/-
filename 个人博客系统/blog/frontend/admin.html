<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 - 我的博客</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-brand">My<em>Blog</em></a>
      <div class="nav-links">
        <a href="index.html">首页</a>
        <a href="admin.html" class="active">管理</a>
      </div>
    </div>
  </nav>
  <div class="container">
    <div class="admin-header">
      <h1 class="admin-title">Editorial Dashboard</h1>
      <p class="admin-subtitle">发布与管理文章</p>
    </div>
    <div class="admin-layout">
      <div class="form-card">
        <h2>New Article</h2>
        <form id="articleForm">
          <div class="form-group">
            <label for="title">标题</label>
            <input type="text" id="title" placeholder="请输入文章标题" required>
          </div>
          <div class="form-group">
            <label for="category">分类</label>
            <input type="text" id="category" placeholder="如：技术、日常、随笔">
          </div>
          <div class="form-group">
            <label for="content">内容</label>
            <textarea id="content" placeholder="请输入文章内容" required></textarea>
          </div>
          <button type="submit" class="btn btn-accent">Publish Article</button>
        </form>
      </div>
      <div class="manage-list">
        <div class="manage-list-header">Published Articles</div>
        <div id="manageList"></div>
      </div>
    </div>
  </div>
  <footer class="footer">MyBlog &copy; 2026 &mdash; Published with passion</footer>
  <script src="js/admin.js"></script>
</body>
</html>
