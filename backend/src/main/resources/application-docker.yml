spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:yunnong}?stringtype=unspecified
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

minio:
  endpoint: ${MINIO_ENDPOINT:http://minio:9000}

logging:
  level:
    com.yunong: INFO
    org.springframework.security: INFO
