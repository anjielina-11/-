version: '3.8'

services:
  ai-service:
    build: .
    container_name: agricultural-ai-service
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./chroma_db:/app/chroma_db
      - ./best_model.pth:/app/best_model.pth
      - ./class_to_idx.pth:/app/class_to_idx.pth
    environment:
      - APP_NAME=Agricultural AI Service
      - APP_VERSION=1.0.0
      - DEBUG=False
      - HOST=0.0.0.0
      - PORT=8000
      - CONFIDENCE_THRESHOLD=0.6
      - RAG_TOP_K=3
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_API_BASE=${LLM_API_BASE}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME}
      - WEATHER_API_KEY=${WEATHER_API_KEY}
      - WEATHER_API_BASE=${WEATHER_API_BASE}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s