# ============================================
# 云南农业智能诊断平台 - Nginx 反向代理
# 统一入口 → 前端静态资源 / 后端API / AI服务
# ============================================

upstream backend {
    server backend:8080;
}

upstream ai-service {
    server ai-service:8000;
}

server {
    listen 80;
    server_name localhost;
    client_max_body_size 20M;

    # 前端静态资源
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 业务后端 API
    location /api/ {
        proxy_pass http://backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Swagger UI
    location /swagger-ui.html {
        proxy_pass http://backend/swagger-ui.html;
        proxy_set_header Host $host;
    }

    location /swagger-ui/ {
        proxy_pass http://backend/swagger-ui/;
        proxy_set_header Host $host;
    }

    location /api-docs {
        proxy_pass http://backend/api-docs;
        proxy_set_header Host $host;
    }

    # AI 服务
    location /ai/ {
        proxy_pass http://ai-service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 180s;
        proxy_connect_timeout 10s;
    }

    # MinIO 控制台
    location /minio/ {
        proxy_pass http://minio:9001/;
        proxy_set_header Host $host;
    }

    # Actuator 健康检查
    location /actuator/ {
        proxy_pass http://backend/actuator/;
        proxy_set_header Host $host;
    }
}
