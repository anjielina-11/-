version: '3.8'

services:
  # PostgreSQL 16 + PostGIS 3 + pgvector
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: yunnong-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: yunnong
      POSTGRES_USER: yunong
      POSTGRES_PASSWORD: yunong123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yunong -d yunnong"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 7
  redis:
    image: redis:7-alpine
    container_name: yunnong-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO (文件存储)
  minio:
    image: minio/minio:latest
    container_name: yunnong-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot 业务后端
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: yunnong-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: yunnong
      DB_USER: yunong
      DB_PASSWORD: yunong123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: yunnong-images
      JWT_SECRET: dGhpc0lzQVZlcnlTZWN1cmVBbmRMb25nU2VjcmV0S2V5Rm9yWXVubm9uZ1BsYXRmb3JtMjAyNA==
    ports:
      - "8080:8080"

volumes:
  pgdata:
  redisdata:
  miniodata:
