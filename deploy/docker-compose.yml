# ============================================
# 云南农业智能诊断平台 - 统一 Docker Compose
# 一键启动: docker compose up -d
# 服务: Nginx + 前端 + 业务后端 + AI服务 + PostgreSQL + Redis + MinIO
# ============================================

services:
  # ==================== 基础设施 ====================

  # PostgreSQL 16 + PostGIS 3 + pgvector
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: yunnong-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: yunnong
      POSTGRES_USER: yunong
      POSTGRES_PASSWORD: ${DB_PASSWORD:-yunong123}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yunong -d yunnong"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yunnong-net

  # Redis 7
  redis:
    image: redis:7-alpine
    container_name: yunnong-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\""]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yunnong-net

  # MinIO 文件存储
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: yunnong-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yunnong-net

  # ==================== 应用服务 ====================

  # AI 服务 (Python + FastAPI + PyTorch)
  ai-service:
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    container_name: yunnong-ai
    restart: unless-stopped
    volumes:
      - ../ai-service/best_model.pth:/app/best_model.pth
      - ../ai-service/class_to_idx.pth:/app/class_to_idx.pth
      - ai_uploads:/app/uploads
      - ai_vector_db:/app/chroma_db
    environment:
      APP_NAME: Agricultural AI Service
      APP_VERSION: 1.0.0
      DEBUG: "false"
      HOST: 0.0.0.0
      PORT: 8000
      CONFIDENCE_THRESHOLD: 0.6
      RAG_TOP_K: 3
      RAG_VECTOR_DB_PATH: /app/chroma_db
      MAX_IMAGE_SIZE: 10485760
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_API_BASE: ${LLM_API_BASE:-https://api.openai.com/v1}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME:-gpt-3.5-turbo}
      WEATHER_API_KEY: ${WEATHER_API_KEY:-}
      WEATHER_API_BASE: ${WEATHER_API_BASE:-https://api.openweathermap.org/data/2.5}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - yunnong-net

  # Spring Boot 业务后端
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: yunnong-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: yunnong
      DB_USER: yunong
      DB_PASSWORD: ${DB_PASSWORD:-yunong123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      MINIO_BUCKET: yunnong-images
      AI_SERVICE_URL: http://ai-service:8000
      JWT_SECRET: ${JWT_SECRET:-yunnong-platform-docker-secret-key-must-be-at-least-256-bits-long}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - yunnong-net

  # ==================== 前端 + Nginx 统一入口 ====================

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: yunnong-frontend
    restart: unless-stopped
    depends_on:
      - backend
      - ai-service
    ports:
      - "80:80"
    networks:
      - yunnong-net

volumes:
  pgdata:
  redisdata:
  miniodata:
  ai_uploads:
  ai_vector_db:

networks:
  yunnong-net:
    driver: bridge
